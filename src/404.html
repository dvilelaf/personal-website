<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 — David Vilela</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&family=Open+Sans:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #0d7cc4 0%, #0a5a8e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        h1 { font-family: 'Oswald', sans-serif; font-size: 6rem; font-weight: 400; opacity: 0.3; }
        p { font-size: 1.2rem; font-weight: 300; margin: 16px 0 32px; opacity: 0.85; }
        a {
            display: inline-block;
            padding: 12px 28px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 6px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        a:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>This page doesn't exist.</p>
        <a href="/">Go home</a>
    </div>
</body>
</html>
